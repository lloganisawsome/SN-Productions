<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | SN Productions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#000;--accent:#fff;--dim:#666;--gold:#c9a84c;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--accent);font-family:'Inter',sans-serif;overflow-x:hidden;}
        #loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s,visibility .8s;}
        #loader.hidden{opacity:0;visibility:hidden;}
        #loader img{width:140px;margin-bottom:25px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4));}
        .loader-wave{display:flex;align-items:center;gap:8px;height:50px;}
        .loader-bar{width:6px;background:var(--gold);border-radius:10px;animation:pulse 1.2s infinite ease-in-out;}
        @keyframes pulse{0%,100%{height:10px;opacity:.3;}50%{height:45px;opacity:1;}}
        nav{position:fixed;top:0;width:100%;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(0,0,0,.95);backdrop-filter:blur(4px);border-bottom:1px solid #111;}
        .nav-logo img{height:45px;}
        .nav-links{display:flex;gap:35px;}
        .nav-links a{color:var(--accent);text-decoration:none;font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;opacity:.6;transition:.3s;}
        .nav-links a:hover,.nav-links a.active{opacity:1;color:var(--gold);}
        .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
        .hamburger span{width:25px;height:2px;background:var(--accent);}
        .mobile-menu{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);flex-direction:column;align-items:center;justify-content:center;gap:40px;z-index:99;}
        .mobile-menu.open{display:flex;}
        .mobile-menu a{color:var(--accent);text-decoration:none;font-size:1.5rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;}
        .mobile-menu a:hover{color:var(--gold);}
        .close-menu{position:absolute;top:30px;right:40px;font-size:2rem;cursor:pointer;color:var(--accent);background:none;border:none;}
        .page-hero{padding:180px 60px 80px;text-align:center;position:relative;background:radial-gradient(ellipse at center,rgba(201,168,76,.06) 0%,transparent 70%);}
        .page-label{font-size:.6rem;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:15px;}
        .page-title{font-size:4rem;font-weight:900;letter-spacing:2px;}
        .divider{width:60px;height:2px;background:var(--gold);margin:25px auto 0;}
        .filter-bar{display:flex;justify-content:center;gap:10px;padding:40px 60px;flex-wrap:wrap;}
        .filter-btn{padding:8px 22px;border:1px solid #222;background:transparent;color:var(--dim);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.3s;font-family:'Inter',sans-serif;}
        .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);}
        .gallery-grid{columns:3;column-gap:4px;padding:0 4px 80px;}
        .gallery-item{break-inside:avoid;margin-bottom:4px;position:relative;overflow:hidden;cursor:pointer;display:block;}
        .gallery-item img,.gallery-item video{width:100%;display:block;transition:transform .5s ease;}
        .gallery-item video{object-fit:cover;max-height:400px;}
        .gallery-item:hover img,.gallery-item:hover video{transform:scale(1.04);}
        .gallery-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:.3s;display:flex;align-items:center;justify-content:center;}
        .gallery-item:hover .gallery-overlay{opacity:1;}
        .gallery-overlay svg{width:38px;height:38px;stroke:var(--gold);fill:none;}
        .video-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);border:1px solid var(--gold);color:var(--gold);font-size:.5rem;letter-spacing:2px;padding:3px 9px;text-transform:uppercase;}
        .caption-badge{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:20px 15px 12px;font-size:.7rem;color:var(--accent);opacity:0;transition:.3s;}
        .gallery-item:hover .caption-badge{opacity:1;}
        .empty-state{text-align:center;padding:100px 60px;color:var(--dim);column-span:all;}
        .empty-state svg{width:60px;height:60px;stroke:#333;fill:none;margin-bottom:20px;}
        .empty-state p{font-size:.8rem;letter-spacing:2px;}

        /* LIGHTBOX */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
        .lightbox.open{display:flex;}
        .lightbox-media{max-width:90vw;max-height:82vh;object-fit:contain;}
        .lightbox video{max-width:90vw;max-height:82vh;outline:none;}
        .lightbox-close{position:absolute;top:20px;right:30px;font-size:2rem;color:var(--accent);background:none;border:none;cursor:pointer;z-index:10;}
        .lightbox-close:hover{color:var(--gold);}
        .lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid #333;color:var(--accent);font-size:1.5rem;cursor:pointer;padding:15px 20px;transition:.3s;}
        .lightbox-prev:hover,.lightbox-next:hover{border-color:var(--gold);color:var(--gold);}
        .lightbox-prev{left:20px;}
        .lightbox-next{right:20px;}
        .lightbox-caption{margin-top:15px;font-size:.7rem;letter-spacing:2px;color:var(--dim);}

        footer{background:#000;border-top:1px solid #1a1a1a;padding:60px;text-align:center;}
        .footer-logo img{height:50px;margin-bottom:30px;opacity:.7;}
        .footer-socials{display:flex;justify-content:center;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
        .footer-socials a{color:var(--dim);transition:.3s;}
        .footer-socials a:hover{color:var(--gold);}
        .footer-socials svg{width:20px;height:20px;}
        .footer-links{display:flex;justify-content:center;gap:30px;margin-bottom:30px;flex-wrap:wrap;}
        .footer-links a{color:var(--dim);text-decoration:none;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;transition:.3s;}
        .footer-links a:hover{color:var(--gold);}
        .footer-copy{font-size:.6rem;color:#333;letter-spacing:2px;}
        @media(max-width:900px){
            nav{padding:20px 30px;}.nav-links{display:none;}.hamburger{display:flex;}
            .page-hero{padding:140px 30px 60px;}.page-title{font-size:2.5rem;}
            .gallery-grid{columns:2;}
            footer{padding:40px 20px;}
        }
        @media(max-width:500px){.gallery-grid{columns:1;}}
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcqRjoVjRJqeIZCme9qL6XZIIJYc04rwE",
        authDomain: "sn-productions.firebaseapp.com",
        projectId: "sn-productions",
        storageBucket: "sn-productions.firebasestorage.app",
        messagingSenderId: "802077774055",
        appId: "1:802077774055:web:53a27a65154ead64d25242"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allMedia = [];
    let currentIndex = 0;
    let currentFiltered = [];

    window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('loader').classList.add('hidden');},1400);});
    window.openMenu=()=>document.getElementById('mobileMenu').classList.add('open');
    window.closeMenu=()=>document.getElementById('mobileMenu').classList.remove('open');

    const grid = document.getElementById('galleryGrid');

    // Media is stored under /media in RTDB
    // Each entry has: { filename, type: 'photo'|'video', tag, caption, localPath }
    // localPath is relative e.g. "media/event-photo.jpg"
    // For videos stored locally: "media/highlight-reel.mp4"
    onValue(ref(db,'media'), (snap) => {
        allMedia = [];
        grid.innerHTML = '';
        if(!snap.exists()){
            grid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>No media yet</p></div>`;
            return;
        }
        snap.forEach(child => {
            allMedia.push({id: child.key, ...child.val()});
        });
        currentFiltered = [...allMedia];
        renderGallery(currentFiltered);
    });

    function isVideo(item){
        return item.type === 'video' || /\.(mp4|mov|webm|ogg)$/i.test(item.filename || '');
    }

    function getPath(item){
        // If it has a full URL stored, use that. Otherwise build local path.
        if(item.url) return item.url;
        return 'media/' + item.filename;
    }

    function renderGallery(items){
        grid.innerHTML = '';
        if(items.length === 0){
            grid.innerHTML = `<div class="empty-state"><p>No media in this category</p></div>`;
            return;
        }
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.dataset.index = i;
            const path = getPath(item);
            const vid = isVideo(item);

            if(vid){
                div.innerHTML = `
                    <video src="${path}" muted preload="metadata" loop></video>
                    <div class="video-badge">Video</div>
                    <div class="gallery-overlay"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                    ${item.caption ? `<div class="caption-badge">${item.caption}</div>` : ''}
                `;
                const v = div.querySelector('video');
                div.addEventListener('mouseenter',()=>v.play());
                div.addEventListener('mouseleave',()=>{v.pause();v.currentTime=0;});
            } else {
                div.innerHTML = `
                    <img src="${path}" alt="${item.caption||''}" loading="lazy">
                    <div class="gallery-overlay"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div>
                    ${item.caption ? `<div class="caption-badge">${item.caption}</div>` : ''}
                `;
            }
            div.addEventListener('click', () => openLightbox(i, items));
            grid.appendChild(div);
        });
    }

    window.filterGallery = (tag, btn) => {
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(tag === 'all') currentFiltered = [...allMedia];
        else if(tag === 'photo') currentFiltered = allMedia.filter(i=>!isVideo(i));
        else if(tag === 'video') currentFiltered = allMedia.filter(i=>isVideo(i));
        else currentFiltered = allMedia.filter(i=>i.tag === tag);
        renderGallery(currentFiltered);
    };

    window.openLightbox = (i, list) => {
        currentIndex = i;
        showLightboxItem(list || currentFiltered, i);
        document.getElementById('lightbox').classList.add('open');
    };

    function showLightboxItem(list, i){
        const item = list[i];
        const path = getPath(item);
        const content = document.getElementById('lightboxContent');
        const vid = isVideo(item);
        if(vid){
            content.innerHTML = `<video class="lightbox-media" src="${path}" controls autoplay></video>`;
        } else {
            content.innerHTML = `<img class="lightbox-media" src="${path}" alt="${item.caption||''}">`;
        }
        document.getElementById('lightboxCaption').textContent = item.caption || '';
    }

    window.closeLightbox = () => {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightboxContent').innerHTML = '';
    };

    window.prevMedia = () => {
        currentIndex = (currentIndex - 1 + currentFiltered.length) % currentFiltered.length;
        showLightboxItem(currentFiltered, currentIndex);
    };
    window.nextMedia = () => {
        currentIndex = (currentIndex + 1) % currentFiltered.length;
        showLightboxItem(currentFiltered, currentIndex);
    };

    document.getElementById('lightbox').addEventListener('click', e => {
        if(e.target === document.getElementById('lightbox')) closeLightbox();
    });
</script>
</body>
